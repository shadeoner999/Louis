name: Release

# Déclenche automatiquement la création d'un GitHub Release quand un tag
# `v*` est poussé, et y attache le SBOM CycloneDX comme artefact officiel.
#
# Workflow type :
#   git tag -s v0.1.0 -m "Louis v0.1.0"
#   git push origin v0.1.0
#   => GitHub Release créée avec sbom.cdx.json en asset

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build SBOM and publish GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      # `npm sbom` exige que l'arbre complet soit installé avant export,
      # même si on filtre les devDeps en sortie via `--omit=dev`.
      - name: Install all dependencies
        run: npm ci

      - name: Generate SBOM CycloneDX (prod components only)
        run: npm run sbom

      - name: Rename SBOM with version tag
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          mv sbom.cdx.json "louis-sbom-${REF_NAME}.cdx.json"
          ls -la "louis-sbom-${REF_NAME}.cdx.json"

      - name: Compute SHA-256 checksum
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          sha256sum "louis-sbom-${REF_NAME}.cdx.json" > "louis-sbom-${REF_NAME}.cdx.json.sha256"
          cat "louis-sbom-${REF_NAME}.cdx.json.sha256"

      - name: Create GitHub Release with SBOM
        uses: softprops/action-gh-release@v2
        with:
          name: Louis ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            louis-sbom-${{ github.ref_name }}.cdx.json
            louis-sbom-${{ github.ref_name }}.cdx.json.sha256
          body: |
            ## Software Bill of Materials (SBOM)

            Cette release inclut un SBOM au format CycloneDX 1.x listant
            toutes les dépendances de production (hors devDependencies).

            - `louis-sbom-<tag>.cdx.json` : SBOM CycloneDX (JSON)
            - `louis-sbom-<tag>.cdx.json.sha256` : checksum SHA-256

            Vérification d'intégrité :

                sha256sum -c louis-sbom-<tag>.cdx.json.sha256

            Le SBOM peut être consommé par tout scanner compatible CycloneDX
            (Trivy, Grype, Dependency-Track, Snyk, etc.) pour cartographier
            la chaîne d'approvisionnement et corréler aux CVE publiées.

            ## Notes de release

            Images Docker publiées sur GHCR pour cette release :

                ghcr.io/association-dataring/louis:<version>
                ghcr.io/association-dataring/louis-migrate:<version>

  # Publication des images Docker sur GHCR : l'image app (standalone) et
  # l'image migrate (drizzle-kit push one-shot) consommées par
  # docker-compose.prod.yml et l'installeur scripts/install.sh.
  docker:
    name: Build and push Docker images (GHCR)
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (arm64)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (app)
        id: meta_app
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Image metadata (migrate)
        id: meta_migrate
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-migrate
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runner
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta_app.outputs.tags }}
          labels: ${{ steps.meta_app.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push migrate image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: migrator
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta_migrate.outputs.tags }}
          labels: ${{ steps.meta_migrate.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
